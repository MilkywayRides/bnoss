name: Build BlazeNeuro Desktop ISO

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Free disk space
        run: |
          echo "=== Disk space before cleanup ==="
          df -h /
          # Remove unnecessary tools to free space for the ISO build
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf /usr/share/swift
          sudo docker image prune --all --force 2>/dev/null || true
          echo "=== Disk space after cleanup ==="
          df -h /

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            debootstrap \
            squashfs-tools \
            xorriso \
            grub-pc-bin \
            grub-efi-amd64-bin \
            grub-common \
            mtools \
            dosfstools

      - name: Build BlazeNeuro ISO
        run: |
          chmod +x build-iso.sh
          sudo ./build-iso.sh

      - name: Show ISO details
        run: |
          echo "=== ISO file ==="
          ls -lh blazeneuro.iso
          echo ""
          echo "=== ISO size ==="
          du -h blazeneuro.iso
          echo ""
          echo "=== SHA256 ==="
          sha256sum blazeneuro.iso

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: blazeneuro-desktop-iso
          path: blazeneuro.iso
          compression-level: 0
